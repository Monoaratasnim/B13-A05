<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME PAGE</title>

<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- tailwind & daisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<style>
*{
  font-family: "Geist", sans-serif;
}
</style>
</head>

<body class="bg-[#F8FAFC]">

<header>
<nav class="flex justify-between items-center px-4 py-4 flex-wrap bg-white border border-[#f4eded]">

<!-- Left side -->
<div class="flex items-center gap-3">
<img class="w-9 h-9" src="assets/github-logo.png" alt="github-logo">
<h2 class="font-semibold text-lg">GitHub Issues Tracker</h2>
</div>

<!-- Right side -->
<div class="flex items-center gap-2 flex-1 max-w-lg mt-2 sm:mt-0">
<div class="flex items-center border-2 border-[#f4eded] rounded-lg px-3 py-2 h-11 flex-1">
<i class="fas fa-search text-gray-500 ml-2"></i>
<input id="searchInput" type="text" placeholder="Search issues..." class="flex-1 border-none text-sm ml-1 outline-none"/>
</div>
<button id="searchBtn" class="btn btn-primary h-11 px-4">Search</button>
</div>
</nav>
</header>

<main>
<section class="mt-14 flex justify-center">

<!-- MAIN CONTAINER -->
<div class="w-full max-w-5xl">

  <!-- TABS -->
  <div class="tabs tabs-box mb-6 bg-white border border-[#f4eded] rounded-lg px-6 py-6 flex  gap-2">
    <input onclick="allTabLoad()" id="allTab" type="radio" name="my_tabs_6"
      class="tab w-28 border-2 font-medium text-[#64748B] border-[#f4eded] checked:bg-[#4A00FF] checked:text-white" aria-label="All" checked/>
    <input onclick="openTabLoad()" id="openTab" type="radio" name="my_tabs_6"
      class="tab w-28 border-2 font-medium text-[#64748B] border-[#f4eded] checked:bg-[#4A00FF] checked:text-white" aria-label="Open"/>
    <input onclick="closedTabLoad()" id="closedTab" type="radio" name="my_tabs_6"
      class="tab w-28 border-2 font-medium text-[#64748B] border-[#f4eded] checked:bg-[#4A00FF] checked:text-white" aria-label="Closed"/>
  </div>

  <!-- TOTAL ISSUES -->
   <div class="  bg-gray-50 border border-[#e5e7eb]">
  <div class="flex justify-center mb-6">
    <div class="flex items-center gap-3 bg-white border border-[#e5e7eb] rounded-lg px-6 py-5 w-full">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
          <i class="fa-solid fa-gear text-purple-600"></i>
        </div>
        <div>
          <h2 id="totalIssues" class="font-semibold text-lg">0 Issues</h2>
          <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex items-center gap-6 text-sm ml-auto">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-500"></span>
          <p>Open</p>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-purple-500"></span>
          <p>Closed</p>
        </div>
      </div>
    </div>
  </div>

  <!-- CARDS -->
  <div id="allContainer" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  <div id="openContainer" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  <div id="closedContainer" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
</div>
</div>
</section>
</main>

<script src="home.js"></script>
</body>
</html>
