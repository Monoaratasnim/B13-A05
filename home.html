<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME PAGE</title>
       <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- tailwind & daisyUI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
  font-family: "Geist", sans-serif;
}
</style>
</head>
<body>
<header>
<nav class="flex justify-between items-center px-4 py-4 flex-wrap  bg-white border border-[#f4eded]">

  <!-- Left side -->
  <div class="flex items-center gap-3">
    <img class="w-9 h-9" src="assets/github-logo.png" alt="github-logo">
    <h2 class="font-semibold text-lg">GitHub Issues Tracker</h2>
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-2 flex-1 max-w-lg mt-2 sm:mt-0">

  <!-- Search input with icon -->
  <div class="flex items-center border-2 border-[#f4eded] shadow-amber-50 rounded-lg px-3 py-2 h-11 flex-1">
    <input type="text" placeholder="Search issues..." class="flex-1 border-none text-sm outline-none" />
    <i class="fas fa-search text-gray-500 ml-2"></i>
  </div>

  <!-- Search button -->
  <button class="btn btn-primary h-11 px-4">Search</button>

</div>

</nav>
</header>
</body>
</html>
