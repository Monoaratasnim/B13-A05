<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- tailwind & daisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<style>
  *{
    font-family: "Geist", sans-serif;
  }
</style>
</head>

<body class="bg-[#F8FAFC]">

<header>
<nav class="flex flex-wrap justify-between items-center px-4 py-4 bg-white border-b border-[#f4eded]">

  <!-- Left side -->
  <div class="flex items-center gap-3">
    <img class="w-9 h-9" src="assets/github-logo.png" alt="github-logo">
    <h2 class="font-semibold text-lg">GitHub Issues Tracker</h2>
  </div>

  <!-- Right side -->
  <div class="flex flex-1 flex-col sm:flex-row items-stretch sm:items-center gap-2 mt-2 sm:mt-0 max-w-lg">
    <div class="flex flex-1 border-2 border-[#f4eded] rounded-lg px-3 py-2 h-11 items-center">
      <i class="fas fa-search text-gray-500 ml-2"></i>
      <input id="searchInput" type="text" placeholder="Search issues..." class="flex-1 border-none text-sm ml-1 outline-none"/>
    </div>
    <button id="searchBtn" class="btn btn-primary h-11 px-4 w-full sm:w-auto">Search</button>
  </div>

</nav>
</header>

<main class="mt-8 px-4 sm:px-6 lg:px-8">
<section class="flex justify-center">

<div class="w-full max-w-5xl mb-10">

  <!-- TABS -->
  <div class="tabs tabs-box mb-6 bg-white border border-[#f4eded] rounded-lg flex flex-wrap gap-2 px-4 py-4">
    <input onclick="allTabLoad()" id="allTab" type="radio" name="my_tabs_6"
      class="tab w-full sm:w-28 border-2 font-medium text-[#64748B] border-[#f4eded] checked:bg-[#4A00FF] checked:text-white" aria-label="All" checked/>
    <input onclick="openTabLoad()" id="openTab" type="radio" name="my_tabs_6"
      class="tab w-full sm:w-28 border-2 font-medium text-[#64748B] border-[#f4eded] checked:bg-[#4A00FF] checked:text-white" aria-label="Open"/>
    <input onclick="closedTabLoad()" id="closedTab" type="radio" name="my_tabs_6"
      class="tab w-full sm:w-28 border-2 font-medium text-[#64748B] border-[#f4eded] checked:bg-[#4A00FF] checked:text-white" aria-label="Closed"/>
  </div>

  <!-- TOTAL ISSUES -->
  <div class="bg-gray-50 border border-[#e5e7eb] rounded-lg mb-6">
    <div class="flex flex-col sm:flex-row justify-between items-center p-4 gap-4">
      <div class="flex items-center gap-3 w-full sm:w-auto">
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
         <img src="assets/Aperture.png" alt="">
        </div>
        <div>
          <h2 id="totalIssues" class="font-semibold text-lg">0 Issues</h2>
          <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex items-center gap-6 text-sm">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-500"></span>
          <p>Open</p>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-purple-500"></span>
          <p>Closed</p>
        </div>
      </div>
    </div>
  </div>

  <!-- CARDS -->
  <div id="allContainer" class="tab-content grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
  <div id="openContainer" class="tab-content grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
  <div id="closedContainer" class="tab-content grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>

</div>
</section>

<dialog id="issueModal" class="modal">
  <div class="modal-box max-w-2xl">
    <h3 id="modalTitle" class="font-bold text-2xl mb-3"></h3>

    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 mb-4 text-sm">
      <span id="modalStatus" class="badge"></span>
      <span id="modalAuthor" class="text-gray-500"></span>
      <span id="modalDate" class="text-gray-500"></span>
    </div>

    <div class="flex gap-2 mb-4 flex-wrap">
      <span class="badge badge-error badge-outline">BUG</span>
      <span class="badge badge-warning badge-outline">HELP WANTED</span>
    </div>

    <p id="modalDescription" class="text-gray-600 mb-6"></p>

    <div class="bg-gray-100 p-4 rounded-lg flex flex-col sm:flex-row justify-between mb-6 gap-4">
      <div>
        <p class="text-sm text-gray-500">Assignee:</p>
        <p id="modalAssignee" class="font-semibold"></p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Priority:</p>
        <span id="modalPriority" class="badge"></span>
      </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary w-full sm:w-auto">Close</button>
      </form>
    </div>

  </div>
</dialog>

</main>

<script src="home.js"></script>
</body>
</html>
