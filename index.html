<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- tailwind & daisyUI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
    *{
  font-family: "Geist", sans-serif;
}
</style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center">

<section class="w-full max-w-md  py-8 px-8 bg-white border border-[#f4eded] rounded-xl shadow-sm">
   <div class="flex flex-col items-center justify-center gap-3">
    <img class="w-[100px] h-[100px]" src="assets/github-logo.png" alt="github logo">
    <h2 class="text-[#1F2937]  font-semibold text-2xl">GitHub Issues    Tracker</h2>
    <p class="text-[#64748B] text-[1rem]">Sign in to manage your issues</p>
   </div>
   <div class="mt-6 gap-4">
    <label class="text-[16px] text-[#1F2937]  font-medium">Username</label><br>
    <input id="inputName" class="py-3 px-3 w-full rounded-lg border-2 border-[#f4eded] shadow-amber-50" type="text" placeholder="Enter username"><br>
    <p class="text-[#4A00FF] text-sm mb-4 mt-1">Default: admin</p>
    <label class="text-[16px] text-[#1F2937] font-medium">Password</label><br>
    <input id="password" class="py-3 px-3 w-full rounded-lg  border-2 border-[#f4eded] shadow-amber-50" type="password" placeholder="Enter Password">
      <p class="text-[#4A00FF] text-sm mt-1">Default: admin123</p>
</div>
  <button id="loginBtn" class="btn btn-primary text-center w-full mt-6 text-[16px] py-3 px-3 rounded-lg">Sign In</button>

   <button></button>
  </section>
    <script src="login.js"></script>
  
</body>
</html>
